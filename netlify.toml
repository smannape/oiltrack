# ============================================================
# CRUDE RADAR — netlify.toml (Pro Plan)
# ============================================================

[build]
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Schedule defined inline in scheduled-refresh.mjs via export const config

# ── API REDIRECTS ─────────────────────────────────────────────
[[redirects]]
  from   = "/api/oil-data"
  to     = "/.netlify/functions/get-oil-data"
  status = 200

[[redirects]]
  from   = "/api/oil-data"
  to     = "/.netlify/functions/get-oil-data"
  status = 200

[[redirects]]
  from   = "/api/oil-prices"
  to     = "/.netlify/functions/get-oil-data?type=prices"
  status = 200

[[redirects]]
  from   = "/api/oil-news"
  to     = "/.netlify/functions/get-oil-data?type=news"
  status = 200

[[redirects]]
  from   = "/api/oil-eia"
  to     = "/.netlify/functions/get-oil-data?type=eia"
  status = 200

[[redirects]]
  from   = "/api/oil-meta"
  to     = "/.netlify/functions/get-oil-data?type=meta"
  status = 200

[[redirects]]
  from   = "/api/oil-refresh"
  to     = "/.netlify/functions/get-oil-data"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/ais-refresh"
  to     = "/.netlify/functions/fetch-ais-data"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/oil-tankers"
  to     = "/.netlify/functions/get-oil-data"
  status = 200

[[redirects]]
  from   = "/api/oil-telegram"
  to     = "/.netlify/functions/get-telegram-data"
  status = 200

[[redirects]]
  from   = "/api/telegram-register"
  to     = "/.netlify/functions/get-telegram-data"
  status = 200

# Telegram webhook is accessed directly at /.netlify/functions/telegram-webhook
# No redirect needed — Netlify functions are auto-accessible at that path


[[redirects]]
  from   = "/api/eia-charts"
  to     = "/.netlify/functions/get-eia-data"
  status = 200

[[redirects]]
  from   = "/api/eia-refresh"
  to     = "/.netlify/functions/get-eia-data"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/eia-extra"
  to     = "/.netlify/functions/get-eia-extra"
  status = 200

[[redirects]]
  from   = "/api/eia-extra-refresh"
  to     = "/.netlify/functions/get-eia-extra"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/events"
  to     = "/.netlify/functions/get-events"
  status = 200

[[redirects]]
  from   = "/api/events-refresh"
  to     = "/.netlify/functions/get-events"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/stocks"
  to     = "/.netlify/functions/get-stocks"
  status = 200

[[redirects]]
  from   = "/api/stocks-refresh"
  to     = "/.netlify/functions/get-stocks"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── SECURITY HEADERS ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# ── ASSET CACHING ────────────────────────────────────────────
[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control             = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-cache"

[[headers]]
  for = "/css/*.css"
  [headers.values]
    Cache-Control             = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-cache"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
